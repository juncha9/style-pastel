<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Style Pastel — all categories</title>
</head>
<body>
    <!-- Layout (blue): display, position, flex/grid, gap, alignment, overflow -->
    <section style="display: flex; flex-direction: row; align-items: center; justify-content: space-between; gap: 16px; position: relative; top: 0; left: 0; z-index: 10; overflow: hidden;">
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); grid-auto-rows: minmax(40px, auto); place-items: center; column-gap: 8px; row-gap: 12px; order: 2;"></div>
        <div style="position: absolute; inset: 0 8px 0 8px; float: left; clear: both; visibility: visible; aspect-ratio: 16 / 9; isolation: isolate;"></div>
    </section>

    <!-- Box (emerald): sizing + spacing -->
    <section style="width: 320px; height: 240px; min-width: 200px; max-width: 100%; min-height: 120px; max-height: 80vh; box-sizing: border-box; padding: 12px 16px; padding-inline-start: 24px; margin: 0 auto; margin-block-end: 32px;">
        <div style="inline-size: 50%; block-size: 100%; padding-top: 8px; padding-right: 8px; padding-bottom: 8px; padding-left: 8px; margin-top: 4px; margin-bottom: 4px;"></div>
    </section>

    <!-- Typography (amber): font, color, text, spacing, white-space -->
    <section style="font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; font-style: italic; font-variant-numeric: tabular-nums; line-height: 1.5; letter-spacing: 0.02em; word-spacing: 0.1em; color: #1f2937; text-align: center; text-transform: uppercase; text-decoration: underline dotted; text-overflow: ellipsis; white-space: nowrap; word-break: keep-all; overflow-wrap: anywhere; hyphens: auto; vertical-align: middle; tab-size: 4; direction: ltr; writing-mode: horizontal-tb;">
        <p style="content: ''; quotes: '«' '»'; list-style: square inside;">Sample text — typography category</p>
    </section>

    <!-- Surface (pink): background, border, outline, shadow, opacity, filter, mask -->
    <section style="background: linear-gradient(135deg, #fce7f3, #fbcfe8); background-color: #fff; background-image: url('bg.png'); background-position: center center; background-size: cover; background-repeat: no-repeat; border: 1px solid #f472b6; border-top-left-radius: 12px; border-bottom-right-radius: 12px; outline: 2px dashed #ec4899; outline-offset: 4px; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08); opacity: 0.95; filter: blur(0.5px) saturate(1.1); backdrop-filter: blur(8px); mix-blend-mode: multiply; mask-image: linear-gradient(black, transparent); -webkit-mask-size: cover; clip-path: inset(10px); paint-order: stroke fill;">
    </section>

    <!-- Motion (violet): transition, animation, transform, translate/rotate/scale -->
    <section style="transition: transform 200ms ease, opacity 150ms linear; transition-property: transform; transition-duration: 200ms; animation: fadeIn 400ms ease-out infinite; animation-delay: 50ms; animation-fill-mode: forwards; transform: translate(8px, -4px) rotate(2deg) scale(1.05); transform-origin: center; translate: 8px -4px; rotate: 2deg; scale: 1.05; perspective: 600px; backface-visibility: hidden; will-change: transform, opacity;">
    </section>

    <!-- Other (gray): cursor, select, pointer, scroll, touch, etc. -->
    <section style="cursor: pointer; pointer-events: auto; user-select: none; -webkit-user-select: none; touch-action: pan-y; caret-color: #6366f1; accent-color: #6366f1; appearance: none; resize: vertical; scroll-behavior: smooth; scroll-snap-type: y mandatory; scroll-padding-top: 16px; overscroll-behavior: contain; scrollbar-gutter: stable; image-rendering: crisp-edges; color-scheme: light dark; print-color-adjust: exact;">
    </section>
</body>
</html>
